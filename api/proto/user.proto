syntax = "proto3";

package user;
option go_package = "github.com/Lhh220/g-video/api/proto/user";

// --- 基础消息 ---
message User {
    int64 id = 1;
    string username = 2;
    string avatar = 3;
    int32 role = 4; // 0-用户, 1-管理员
    int64 follower_count = 5;
    int64 follow_count = 6;
}

// --- 请求与响应 ---

// 注册请求
message RegisterRequest {
    string username = 1;
    string password = 2;
    int32 role = 3; // 新增：0-用户, 1-管理员
}
message RegisterResponse {
    int32 status_code = 1;
    string status_msg = 2;
    int64 user_id = 3;
    string token = 4;
}

// 登录请求
message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    int32 status_code = 1;
    string status_msg = 2;
    int64 user_id = 3;
    string token = 4;
}

// 获取用户信息
message UserInfoRequest {
    int64 user_id = 1;
    string token = 2;
}

message UserInfoResponse {
    int32 status_code = 1;
    string status_msg = 2;
    User user = 3;
}

// --- 服务定义 ---
service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetUserInfo(UserInfoRequest) returns (UserInfoResponse);
        // 新增这一行
    rpc UpdateUserInfo(UpdateUserInfoRequest) returns (UpdateUserInfoResponse);
}

// 更新用户信息请求
message UpdateUserInfoRequest {
    string token = 1;
    string username = 2;    
    bytes  avatar_data = 3;  // 修改：从 string 改为 bytes，接收图片二进制流
    string password = 4;    
    string signature = 5;   
    string filename = 6;    // 新增：用于获取文件后缀（如 .jpg, .png）
}

message UpdateUserInfoResponse {
    int32 status_code = 1;
    string status_msg = 2;
}
